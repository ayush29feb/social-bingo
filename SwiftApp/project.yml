name: SocialBingo
options:
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16"
  createIntermediateGroups: true

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: 2.0.0

targets:
  SocialBingo:
    type: application
    platform: iOS
    sources:
      - path: SocialBingo
    info:
      path: SocialBingo/Info.plist
      properties:
        CFBundleName: Social Bingo
        UILaunchStoryboardName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - socialbingo
    dependencies:
      - package: Supabase
        product: Supabase
    settings:
      base:
        SWIFT_VERSION: 5.9
        PRODUCT_BUNDLE_IDENTIFIER: com.example.SocialBingo
        DEVELOPMENT_TEAM: ""

  SocialBingoTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: SocialBingoTests
    dependencies:
      - target: SocialBingo
    settings:
      base:
        SWIFT_VERSION: 5.9
        PRODUCT_BUNDLE_IDENTIFIER: com.example.SocialBingoTests
        GENERATE_INFOPLIST_FILE: YES

schemes:
  SocialBingo:
    build:
      targets:
        SocialBingo: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - SocialBingoTests
  SocialBingoTests:
    build:
      targets:
        SocialBingoTests: [test]
    test:
      config: Debug
      targets:
        - SocialBingoTests
