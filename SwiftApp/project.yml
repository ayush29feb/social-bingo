name: SocialBingo
options:
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16"
  createIntermediateGroups: true

targets:
  SocialBingo:
    type: application
    platform: iOS
    sources:
      - path: SocialBingo
    info:
      path: SocialBingo/Info.plist
      properties:
        CFBundleName: Social Bingo
        UILaunchStoryboardName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
    settings:
      base:
        SWIFT_VERSION: 5.9
        PRODUCT_BUNDLE_IDENTIFIER: com.example.SocialBingo
        DEVELOPMENT_TEAM: ""

  SocialBingoTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: SocialBingoTests
    dependencies:
      - target: SocialBingo
    settings:
      base:
        SWIFT_VERSION: 5.9
        PRODUCT_BUNDLE_IDENTIFIER: com.example.SocialBingoTests

schemes:
  SocialBingo:
    build:
      targets:
        SocialBingo: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - SocialBingoTests
  SocialBingoTests:
    build:
      targets:
        SocialBingoTests: [test]
    test:
      config: Debug
      targets:
        - SocialBingoTests
